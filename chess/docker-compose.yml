services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CI=true
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev"

volumes:
  web_node_modules:
